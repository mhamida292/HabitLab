services:
  beaverhabits:
    image: beaverhabits:latest
    build: .
    container_name: beaverhabits
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./data:/data
    environment:
      - SECRET_KEY=change-me-to-a-long-random-string
      - JWT_SECRET=change-me-too
      - DATABASE_URL=sqlite+aiosqlite:////data/db.sqlite
      - TIME_ZONE=UTC
