{% extends "base.html" %}
{% block title %}Stats · HabitLab{% endblock %}

{% block sidebar %}
<div class="s-label">Navigation</div>
<ul class="flist">
    <li class="fi-item" onclick="window.location='/'"><div class="fn">← Back to habits</div></li>
</ul>
{% endblock %}

{% block content %}
<div style="padding:16px">
    <h1 style="font-size:18px;margin-bottom:14px">Overall stats</h1>
    <div class="stats-row" id="aggCards">
        <div class="stat-card"><div class="stat-num" id="aActive">—</div><div class="stat-lbl">Active</div></div>
        <div class="stat-card"><div class="stat-num" id="aAvg30">—</div><div class="stat-lbl">30-day avg</div></div>
        <div class="stat-card"><div class="stat-num" id="aBestStreak">—</div><div class="stat-lbl">Best streak</div></div>
        <div class="stat-card"><div class="stat-num" id="aToday">—</div><div class="stat-lbl">Today</div></div>
    </div>
    <div id="overviewRows" style="margin-top:18px"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/heatmap.js?v={{ asset_version }}"></script>
<script type="module" src="/static/js/stats.js?v={{ asset_version }}"></script>
{% endblock %}
