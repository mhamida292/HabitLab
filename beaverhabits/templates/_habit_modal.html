<div class="ov" id="habitOv">
    <div class="modal">
        <div class="mh">
            <div class="mt" id="habitModalTitle">New habit</div>
            <button class="mx" onclick="closeHabitModal()">&times;</button>
        </div>
        <div class="mb">
            <div class="fg">
                <label class="fl">Name</label>
                <input class="finp" id="habitNameIn" maxlength="80" placeholder="e.g. Drink water">
            </div>
            <div class="fg">
                <label class="fl">Icon</label>
                <div class="icon-row">
                    <input class="finp icon-input" id="habitIconIn" maxlength="4" value="📌" style="width:64px;text-align:center;font-size:22px">
                    <div class="icon-grid" id="iconGrid"></div>
                </div>
            </div>
            <div class="fg">
                <label class="fl">Frequency</label>
                <div style="display:flex;gap:8px;align-items:center">
                    <input class="finp" id="habitTargetIn" type="number" min="1" max="99" value="1" style="width:80px">
                    <span style="font-size:13px;color:var(--text-dim)">times per</span>
                    <select class="finp" id="habitPeriodIn" style="width:110px">
                        <option value="D">day</option>
                        <option value="W">week</option>
                    </select>
                </div>
                <div class="cwarn" id="habitFreqHint" style="margin-top:4px;text-align:left">Each click adds one. The day shows as fully done when count reaches the target.</div>
            </div>
            <div class="fg">
                <label class="fl">Date started</label>
                <input class="finp" id="habitStartedIn" type="date" style="width:180px">
                <div class="cwarn" style="margin-top:4px;text-align:left">Percentage stats are scoped to days from this date onward.</div>
            </div>
            <div class="fg">
                <label class="fl">Tags (comma-separated)</label>
                <input class="finp" id="habitTagsIn" placeholder="health, learning">
            </div>
        </div>
        <div class="mf">
            <button class="bdng" id="habitDeleteBtn" style="visibility:hidden">Delete</button>
            <div style="display:flex;gap:8px">
                <button class="bgho" onclick="closeHabitModal()">Cancel</button>
                <button class="bpri" id="habitSaveBtn">Save</button>
            </div>
        </div>
    </div>
</div>
